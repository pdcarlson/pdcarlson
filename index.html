<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paul Carlson | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="ide-container">

        <nav class="activity-bar">
            <ul class="nav-list">
                <li class="nav-item active-nav"><i class="fa-solid fa-file-code"></i></li>
                <li class="nav-item"><i class="fa-solid fa-user"></i></li>
                <li class="nav-item"><i class="fa-solid fa-folder-open"></i></li>
                <li class="nav-item"><i class="fa-solid fa-file-lines"></i></li>
                <li class="nav-item"><i class="fa-solid fa-envelope"></i></li>
            </ul>

            <ul class="social-list">
                <li class="nav-item"><i class="fa-brands fa-github"></i></li>
                <li class="nav-item"><i class="fa-brands fa-linkedin"></i></li>
            </ul>
        </nav>
        <aside class="sidebar">
            <div class="file-explorer">
                <p class="explorer-title">EXPLORER</p>
                <ul class="file-list">
                    <li class="file-item active">home.html</li>
                    <li class="file-item">about.md</li>
                    <li class="file-item">projects.js</li>
                    <li class="file-item">contact.css</li>
                </ul>
            </div>
        </aside>

        <main class="main-content">
            <div class="code-editor">
                <div class="line">
                    <span class="line-number">1</span>
                    <span class="html-tag">&lt;h1&gt;</span>
                    <span class="html-text">Paul Carlson</span>
                    <span class="html-tag">&lt;/h1&gt;</span>
                </div>
                <div class="line">
                    <span class="line-number">2</span>
                </div>
                <div class="line">
                    <span class="line-number">3</span>
                    <span class="html-tag">&lt;p&gt;</span>
                    <span class="html-text">Aspiring Software Developer & RPI Student.</span>
                    <span class="html-tag">&lt;/p&gt;</span>
                </div>
            </div>
        </main>

    </div>
</body>
</html>
